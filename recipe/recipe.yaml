schema_version: 1

context:
  version: 1.5.2

package:
  name: livekit-plugins-google
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/l/livekit-plugins-google/livekit_plugins_google-${{ version }}.tar.gz
    sha256: af67575ad0d6b8342e2ea06afe23f9d91f3362fa7db4a842e2e626a57bb43c18
  - url: https://raw.githubusercontent.com/livekit/agents/refs/tags/livekit-agents%40${{ version }}/LICENSE
    sha256: c71d239df91726fc519c6eb72d318ec65820627232b2f796219e87dcf35d0ab4
    file_name: LICENSE

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - google-auth >=2,<3
    - google-cloud-speech >=2,<3
    - google-cloud-texttospeech >=2.32,<3
    - livekit-agents >=1.3.6
tests:
  - python:
      python_version:
        - ${{ python_min }}.*
        - '*'
      imports:
        - livekit.plugins.google
      pip_check: true

about:
  summary: Agent Framework plugin for services from Google Cloud
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://pypi.org/project/livekit-plugins-google/
  repository: https://github.com/livekit/agents
  documentation: https://docs.livekit.io

extra:
  recipe-maintainers:
    - conda-forge/livekit
